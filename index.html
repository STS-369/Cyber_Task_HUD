<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CYBER_TASK_HUD // V3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0d0d0d;
            --neon-primary: #00f3ff; /* Default Cyan */
            --neon-secondary: #ff00ff;
            --text: #e0e0e0;
            --dim: #444;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0; padding: 20px;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            min-height: 100vh;
        }

        /* INITIALIZATION SCREEN */
        #init-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 30px;
        }

        .init-title { font-family: 'Orbitron'; color: var(--neon-primary); margin-bottom: 10px; letter-spacing: 4px; }
        .init-sub { font-size: 0.8rem; color: var(--dim); margin-bottom: 40px; }

        .color-grid { display: flex; gap: 20px; margin-bottom: 40px; }
        .color-opt {
            width: 50px; height: 50px; border: 2px solid white; cursor: pointer;
            transition: transform 0.3s;
        }
        .color-opt:hover { transform: scale(1.2); }

        /* HUD LAYOUT */
        #hud-interface { display: none; opacity: 0; transition: opacity 1s; }

        .glitch-header {
            color: var(--neon-primary);
            text-shadow: 2px 2px var(--neon-secondary);
            font-size: 1rem; border-bottom: 1px solid var(--neon-primary);
            padding-bottom: 10px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card {
            background: var(--panel); border: 1px solid var(--dim); padding: 15px;
            text-align: center; position: relative;
        }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon-secondary); }
        .stat-value { font-size: 1.5rem; color: var(--neon-primary); font-family: 'Orbitron'; }
        .stat-label { font-size: 0.6rem; color: var(--dim); margin-top: 5px; }

        .section-label { font-size: 0.7rem; color: var(--neon-secondary); margin-bottom: 15px; display: block; font-weight: bold; }

        .task-input-container { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"], textarea {
            background: #111; border: 1px solid var(--dim); color: var(--text);
            padding: 14px; font-family: inherit; width: 100%; outline: none;
        }
        input[type="text"]:focus { border-color: var(--neon-primary); box-shadow: 0 0 10px var(--neon-primary); }

        .btn-add {
            background: var(--neon-primary); color: black; border: none; padding: 0 20px;
            font-family: 'Orbitron'; font-weight: 700; cursor: pointer;
        }

        .task-item {
            background: var(--panel); border: 1px solid #222; margin-bottom: 10px;
            padding: 15px; display: flex; align-items: center; gap: 15px;
            transition: 0.3s; cursor: pointer;
        }
        .task-item.completed { opacity: 0.5; border-color: var(--dim); }
        .task-item.completed span { text-decoration: line-through; color: var(--dim); }

        .checkbox { width: 20px; height: 20px; border: 2px solid var(--neon-primary); flex-shrink: 0; }
        .completed .checkbox { background: var(--neon-secondary); border-color: var(--neon-secondary); }

        .delete-btn { margin-left: auto; color: var(--dim); font-size: 0.7rem; font-family: 'Orbitron'; }
        .delete-btn:hover { color: var(--danger); }

        .btn-clear {
            width: 100%; background: transparent; border: 1px solid var(--danger);
            color: var(--danger); padding: 10px; font-family: 'Orbitron';
            font-size: 0.7rem; margin-top: 10px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-clear:hover { background: var(--danger); color: white; }

        .notes-area { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        textarea { height: 120px; resize: none; border-left: 4px solid var(--neon-secondary); }

        .scanline {
            width: 100%; height: 100px; z-index: 100;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 243, 255, 0.03) 50%, rgba(0, 0, 0, 0) 100%);
            position: fixed; bottom: 100%; left: 0; pointer-events: none;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <!-- INIT SCREEN -->
    <div id="init-screen">
        <div class="init-title">SYSTEM_INITIALIZATION</div>
        <div class="init-sub">SELECT_HUD_COLOR_PROFILE</div>
        <div class="color-grid">
            <div class="color-opt" style="background: #00f3ff;" onclick="initHUD('#00f3ff', '#ff00ff')"></div>
            <div class="color-opt" style="background: #ff00ff;" onclick="initHUD('#ff00ff', '#00f3ff')"></div>
            <div class="color-opt" style="background: #39ff14;" onclick="initHUD('#39ff14', '#bc13fe')"></div>
        </div>
        <div style="font-size: 0.6rem; color: var(--dim);">AWAITING_USER_INPUT...</div>
    </div>

    <!-- HUD INTERFACE -->
    <div id="hud-interface">
        <header class="glitch-header">
            <div id="hud-title">CYBER_TASK_HUD // v3.0</div>
            <div id="clock" style="font-family: 'Orbitron';">00:00:00</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="count-active">0</div>
                <div class="stat-label">ACTIVE_THREADS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="count-done">0</div>
                <div class="stat-label">CYCLES_COMPLETE</div>
            </div>
        </div>

        <span class="section-label">> NEW_OBJECTIVE</span>
        <div class="task-input-container">
            <input type="text" id="task-input" placeholder="Input command..." autocomplete="off">
            <button class="btn-add" onclick="addTask()">ADD</button>
        </div>

        <span class="section-label">> PRIORITY_QUEUE</span>
        <ul class="task-list" id="task-list"></ul>
        <button class="btn-clear" onclick="clearCompleted()">TERMINATE_COMPLETED_CYCLES</button>

        <div class="notes-area">
            <span class="section-label">> ENCRYPTED_LOGS</span>
            <textarea id="notes-input" placeholder="Awaiting data..." oninput="saveNotes()"></textarea>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('cyber_tasks_v3')) || [];
        let theme = JSON.parse(localStorage.getItem('cyber_theme')) || null;

        function initHUD(primary, secondary) {
            theme = { primary, secondary };
            localStorage.setItem('cyber_theme', JSON.stringify(theme));
            applyTheme();
            document.getElementById('init-screen').style.display = 'none';
            document.getElementById('hud-interface').style.display = 'block';
            setTimeout(() => document.getElementById('hud-interface').style.opacity = '1', 50);
            render();
        }

        function applyTheme() {
            if (!theme) return;
            document.documentElement.style.setProperty('--neon-primary', theme.primary);
            document.documentElement.style.setProperty('--neon-secondary', theme.secondary);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            let active = 0, done = 0;

            tasks.forEach((task, index) => {
                if (task.completed) done++; else active++;
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="checkbox"></div>
                    <span>${task.text}</span>
                    <div class="delete-btn" onclick="deleteTask(event, ${index})">[DEL]</div>
                `;
                li.onclick = () => toggleTask(index);
                list.appendChild(li);
            });

            document.getElementById('count-active').innerText = active;
            document.getElementById('count-done').innerText = done;
            localStorage.setItem('cyber_tasks_v3', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if (input.value.trim()) {
                tasks.push({ text: input.value, completed: false });
                input.value = '';
                render();
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            render();
        }

        function deleteTask(event, index) {
            event.stopPropagation();
            tasks.splice(index, 1);
            render();
        }

        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            render();
        }

        function saveNotes() {
            localStorage.setItem('cyber_notes_v3', document.getElementById('notes-input').value);
        }

        // Auto-load if theme exists
        if (theme) {
            applyTheme();
            document.getElementById('init-screen').style.display = 'none';
            document.getElementById('hud-interface').style.display = 'block';
            document.getElementById('hud-interface').style.opacity = '1';
            document.getElementById('notes-input').value = localStorage.getItem('cyber_notes_v3') || '';
            render();
        }

        document.getElementById('task-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
    </script>
</body>
</html>
